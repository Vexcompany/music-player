<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fab fa-soundcloud"></i>
                <span>SC Player</span>
            </div>
        </header>

        <main class="main-content">
            <section class="input-section">
                <div class="input-group">
                    <input type="text" id="scUrlInput" placeholder="Paste SoundCloud URL here...">
                    <button id="resolveBtn" class="btn-primary">
                        <i class="fas fa-link"></i> Resolve
                    </button>
                </div>
                
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Search for tracks...">
                    <button id="searchBtn" class="btn-secondary">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </section>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Fetching tracks...</p>
            </div>

            <section id="searchResults" class="results-grid"></section>

            <section class="recent-section">
                <h2><i class="fas fa-history"></i> Recently Played</h2>
                <div id="recentTracks" class="recent-list"></div>
            </section>
        </main>

        <div id="playerContainer" class="player-container">
            <div id="widgetContainer" class="widget-container"></div>
            
            <div class="custom-player">
                <div class="player-info">
                    <img id="currentImage" src="" alt="Album Art">
                    <div class="track-details">
                        <div id="currentTitle" class="title">No track selected</div>
                        <div id="currentArtist" class="artist">-</div>
                    </div>
                </div>
                
                <div class="player-controls">
                    <button id="prevBtn" class="control-btn"><i class="fas fa-step-backward"></i></button>
                    <button id="playPauseBtn" class="control-btn play-btn"><i class="fas fa-play"></i></button>
                    <button id="nextBtn" class="control-btn"><i class="fas fa-step-forward"></i></button>
                </div>
                
                <div class="player-progress">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar">
                        <div id="progressBar" class="progress-fill"></div>
                    </div>
                    <span id="totalTime">0:00</span>
                </div>
                
                <button id="downloadBtn" class="download-btn" title="Download">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </div>

        <div id="toast" class="toast" style="display: none;"></div>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
